<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuenta activada | GAP</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2e6f6c;
      --bg: #f5f7f6;
      --card: #ffffff;
      --text: #1f2937;
      --subtext: #6b7280;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f9fafb;
        --subtext: #9ca3af;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.8s ease;
    }

    .container {
      background: var(--card);
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      text-align: center;
      max-width: 440px;
      width: 90%;
      transform: translateY(20px);
      opacity: 0;
      animation: slideUp 0.8s ease forwards;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    /* CHECK ANIMADO */
    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: block;
      stroke-width: 2;
      stroke: #4ade80;
      stroke-miterlimit: 10;
      margin: 0 auto 25px;
      box-shadow: inset 0px 0px 0px #4ade80;
      animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
    }

    .checkmark circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 2;
      stroke: #4ade80;
      fill: none;
      animation: stroke .6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark path {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: stroke .3s cubic-bezier(0.65, 0, 0.45, 1) .6s forwards;
    }

    h1 {
      font-size: 22px;
      color: var(--text);
      margin-bottom: 10px;
    }

    p {
      color: var(--subtext);
      font-size: 14px;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn {
      background: var(--primary);
      color: white;
      padding: 14px 22px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      transition: all 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46,111,108,0.3);
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: var(--subtext);
    }

    /* Animaciones */
    @keyframes stroke {
      100% { stroke-dashoffset: 0; }
    }

    @keyframes scale {
      0%, 100% { transform: none; }
      50% { transform: scale(1.1); }
    }

    @keyframes fill {
      100% { box-shadow: inset 0px 0px 0px 40px rgba(74,222,128,0.1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">GAP</div>

    <!-- CHECK SVG ANIMADO -->
    <svg class="checkmark" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="25" fill="none"/>
      <path fill="none" stroke="#4ade80" stroke-width="3" d="M14 27l7 7 17-17"/>
    </svg>

    <h1>Cuenta activada con éxito</h1>

    <p>
      Tu cuenta fue verificada correctamente. Ya podés comenzar a usar 
      <strong>GAP</strong> y gestionar todo de forma simple y profesional.
    </p>

    <a href="https://tuapp.com/login" class="btn">
      Ir al login
    </a>

    <div class="footer">
      © GAP - Sistema de gestión personal
    </div>
  </div>
</body>
</html>
